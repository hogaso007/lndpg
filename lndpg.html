<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Élite Events | Eventos Inolvidables</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Montserrat', sans-serif;
    }

    body{
      background:#0b0b0f;
      color:white;
      overflow-x:hidden;
    }

    html{
      scroll-behavior:smooth;
    }

    /* NAVBAR */

    header{
      position:fixed;
      width:100%;
      top:0;
      z-index:999;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .navbar{
      width:90%;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .logo{
      font-size:30px;
      font-weight:800;
      color:#ff4ecd;
      letter-spacing:1px;
    }

    .logo span{
      color:#00f5ff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#00f5ff;
    }

    .btn-nav{
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      padding:12px 22px;
      border-radius:30px;
    }

    /* HERO */

    .hero{
      min-height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
      url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1600&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:120px 20px;
      position:relative;
    }

    .hero::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#ff4ecd;
      filter:blur(180px);
      opacity:0.2;
      top:-100px;
      left:-100px;
    }

    .hero::after{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#00f5ff;
      filter:blur(180px);
      opacity:0.2;
      bottom:-100px;
      right:-100px;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:950px;
      animation:fadeUp 1.2s ease;
    }

    .hero h1{
      font-size:78px;
      font-weight:800;
      line-height:1.1;
      margin-bottom:25px;
    }

    .hero h1 span{
      background:linear-gradient(45deg,#ff4ecd,#00f5ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero p{
      font-size:22px;
      color:#d6d6d6;
      line-height:1.8;
      margin-bottom:40px;
    }

    .hero-buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .btn{
      padding:18px 34px;
      border-radius:40px;
      text-decoration:none;
      font-weight:700;
      transition:0.4s;
      display:inline-block;
    }

    .btn-primary{
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      color:white;
      box-shadow:0 10px 25px rgba(255,78,205,0.4);
    }

    .btn-primary:hover{
      transform:translateY(-5px) scale(1.03);
    }

    .btn-secondary{
      border:2px solid rgba(255,255,255,0.2);
      color:white;
      backdrop-filter:blur(10px);
    }

    .btn-secondary:hover{
      background:white;
      color:black;
      transform:translateY(-5px);
    }

    /* FEATURES */
