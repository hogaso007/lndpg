<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Élite Events | Eventos Inolvidables</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Montserrat', sans-serif;
    }

    body{
      background:#0b0b0f;
      color:white;
      overflow-x:hidden;
    }

    html{
      scroll-behavior:smooth;
    }

    /* NAVBAR */

    header{
      position:fixed;
      width:100%;
      top:0;
      z-index:999;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .navbar{
      width:90%;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .logo{
      font-size:30px;
      font-weight:800;
      color:#ff4ecd;
      letter-spacing:1px;
    }

    .logo span{
      color:#00f5ff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#00f5ff;
    }

    .btn-nav{
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      padding:12px 22px;
      border-radius:30px;
    }

    /* HERO */
