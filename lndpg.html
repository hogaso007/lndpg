<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Élite Events | Eventos Inolvidables</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Montserrat', sans-serif;
    }

    body{
      background:#0b0b0f;
      color:white;
      overflow-x:hidden;
    }

    html{
      scroll-behavior:smooth;
    }

    /* NAVBAR */

    header{
      position:fixed;
      width:100%;
      top:0;
      z-index:999;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .navbar{
      width:90%;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .logo{
      font-size:30px;
      font-weight:800;
      color:#ff4ecd;
      letter-spacing:1px;
    }

    .logo span{
      color:#00f5ff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#00f5ff;
    }

    .btn-nav{
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      padding:12px 22px;
      border-radius:30px;
    }

    /* HERO */

    .hero{
      min-height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
      url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1600&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:120px 20px;
      position:relative;
    }

    .hero::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#ff4ecd;
      filter:blur(180px);
      opacity:0.2;
      top:-100px;
      left:-100px;
    }

    .hero::after{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#00f5ff;
      filter:blur(180px);
      opacity:0.2;
      bottom:-100px;
      right:-100px;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:950px;
      animation:fadeUp 1.2s ease;
    }

    .hero h1{
      font-size:78px;
      font-weight:800;
      line-height:1.1;
      margin-bottom:25px;
    }

    .hero h1 span{
      background:linear-gradient(45deg,#ff4ecd,#00f5ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero p{
      font-size:22px;
      color:#d6d6d6;
      line-height:1.8;
      margin-bottom:40px;
    }

    .hero-buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .btn{
      padding:18px 34px;
      border-radius:40px;
      text-decoration:none;
      font-weight:700;
      transition:0.4s;
      display:inline-block;
    }

    .btn-primary{
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      color:white;
      box-shadow:0 10px 25px rgba(255,78,205,0.4);
    }

    .btn-primary:hover{
      transform:translateY(-5px) scale(1.03);
    }

    .btn-secondary{
      border:2px solid rgba(255,255,255,0.2);
      color:white;
      backdrop-filter:blur(10px);
    }

    .btn-secondary:hover{
      background:white;
      color:black;
      transform:translateY(-5px);
    }

    /* FEATURES */

    .features{
      padding:110px 8%;
      background:#0f1118;
    }

    .section-title{
      text-align:center;
      margin-bottom:70px;
    }

    .section-title h2{
      font-size:50px;
      margin-bottom:20px;
    }

    .section-title p{
      max-width:750px;
      margin:auto;
      color:#b9b9b9;
      line-height:1.8;
    }

    .features-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:30px;
    }

    .feature-card{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      padding:40px 30px;
      border-radius:25px;
      transition:0.4s;
      position:relative;
      overflow:hidden;
    }

    .feature-card:hover{
      transform:translateY(-12px);
      border-color:#ff4ecd;
      box-shadow:0 15px 40px rgba(255,78,205,0.15);
    }

    .feature-icon{
      font-size:60px;
      margin-bottom:20px;
    }

    .feature-card h3{
      margin-bottom:15px;
      font-size:28px;
    }

    .feature-card p{
      color:#c5c5c5;
      line-height:1.8;
    }

    /* EVENTS */

    .events{
      padding:110px 8%;
      background:#090b10;
    }

    .events-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:35px;
    }

    .event-card{
      background:#12141c;
      border-radius:25px;
      overflow:hidden;
      transition:0.4s;
      border:1px solid rgba(255,255,255,0.05);
    }

    .event-card:hover{
      transform:translateY(-10px);
      box-shadow:0 20px 45px rgba(0,0,0,0.4);
    }

    .event-card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .event-content{
      padding:30px;
    }

    .event-tag{
      display:inline-block;
      padding:8px 18px;
      border-radius:20px;
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      margin-bottom:20px;
      font-size:14px;
      font-weight:700;
    }

    .event-content h3{
      font-size:30px;
      margin-bottom:15px;
    }

    .event-content p{
      color:#b9b9b9;
      line-height:1.8;
      margin-bottom:25px;
    }

    .event-info{
      display:flex;
      justify-content:space-between;
      color:#00f5ff;
      font-weight:600;
    }

    /* STATS */

    .stats{
      padding:100px 8%;
      background:
      linear-gradient(45deg,#ff4ecd,#7b61ff);
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:40px;
      text-align:center;
    }

    .stat h2{
      font-size:65px;
      margin-bottom:10px;
    }

    .stat p{
      font-size:20px;
      font-weight:500;
    }

    /* GALLERY */

    .gallery{
      padding:110px 8%;
      background:#0f1118;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .gallery-grid img{
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:20px;
      transition:0.4s;
    }

    .gallery-grid img:hover{
      transform:scale(1.05);
      box-shadow:0 15px 35px rgba(0,245,255,0.2);
    }

    /* TESTIMONIALS */

    .testimonials{
      padding:110px 8%;
      background:#090b10;
    }

    .testimonial-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:30px;
    }

    .testimonial{
      background:#131620;
      padding:40px;
      border-radius:25px;
      border:1px solid rgba(255,255,255,0.05);
      position:relative;
    }

    .testimonial::before{
      content:"★★★★★";
      color:#ffd700;
      font-size:22px;
      display:block;
      margin-bottom:18px;
    }

    .testimonial p{
      line-height:1.9;
      color:#c5c5c5;
      margin-bottom:25px;
    }

    .testimonial h4{
      color:#00f5ff;
    }
   footer{
      background:#06070a;
      padding:40px 20px;
      text-align:center;
      border-top:1px solid rgba(255,255,255,0.05);
    }

    footer p{
      color:#a0a0a0;
      margin-bottom:12px;
    }

    .socials{
      margin-top:15px;
    }

    .socials a{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      width:45px;
      height:45px;
      border-radius:50%;
      background:#131620;
      color:white;
      text-decoration:none;
      margin:0 8px;
      transition:0.4s;
    }

    .socials a:hover{
      background:linear-gradient(45deg,#ff4ecd,#7b61ff);
      transform:translateY(-4px);
    }

    /* ANIMATION */

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      nav{
        display:none;
      }

      .hero h1{
        font-size:48px;
      }

      .hero p{
        font-size:18px;
      }

      .section-title h2{
        font-size:38px;
      }

      .cta h2{
        font-size:42px;
      }

    }

  </style>
</head>

<body>

  <!-- HEADER -->
header>
    <div class="navbar">
      <div class="logo">Élite<span>Events</span></div>

      <nav>
        <a href="#inicio">Inicio</a>
        <a href="#eventos">Eventos</a>
        <a href="#galeria">Galería</a>
        <a href="#contacto" class="btn-nav">Reservar</a>
      </nav>
    </div>
  </header>
